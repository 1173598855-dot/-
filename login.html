<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - ShopWorld</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
    <style>
        body { margin: 0; background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        .auth-container { display: flex; width: 900px; max-width: 95vw; background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.15); }
        .auth-left { width: 400px; background: linear-gradient(135deg, #131921 0%, #232f3e 50%, #37475a 100%); padding: 50px 40px; color: white; display: flex; flex-direction: column; justify-content: center; }
        .auth-left h1 { font-size: 32px; margin-bottom: 15px; }
        .auth-left p { font-size: 15px; opacity: 0.8; line-height: 1.8; }
        .auth-left .logo-big { font-size: 48px; margin-bottom: 20px; }
        .auth-right { flex: 1; padding: 50px 40px; }
        .auth-tabs { display: flex; margin-bottom: 30px; border-bottom: 2px solid #eee; }
        .auth-tab { padding: 12px 30px; cursor: pointer; font-size: 16px; font-weight: 600; color: #999; border-bottom: 3px solid transparent; transition: all 0.3s; }
        .auth-tab.active { color: #febd69; border-bottom-color: #febd69; }
        .auth-form { display: none; }
        .auth-form.active { display: block; }
        .form-field { margin-bottom: 20px; }
        .form-field label { display: block; margin-bottom: 6px; font-size: 14px; color: #333; font-weight: 500; }
        .form-field input { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 15px; transition: border-color 0.3s; }
        .form-field input:focus { outline: none; border-color: #febd69; }
        .form-options { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; font-size: 14px; }
        .form-options a { color: #febd69; text-decoration: none; }
        .btn-auth { width: 100%; padding: 14px; background: linear-gradient(135deg, #febd69, #f3a847); border: none; border-radius: 10px; color: white; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s; }
        .btn-auth:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(254,189,105,0.4); }
        .btn-auth:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .divider { text-align: center; margin: 20px 0; color: #999; font-size: 13px; position: relative; }
        .divider::before, .divider::after { content: ''; position: absolute; top: 50%; width: 40%; height: 1px; background: #e0e0e0; }
        .divider::before { left: 0; }
        .divider::after { right: 0; }
        .back-link { text-align: center; margin-top: 20px; }
        .back-link a { color: #666; text-decoration: none; font-size: 14px; }
        .back-link a:hover { color: #febd69; }
        .error-msg { color: #e74c3c; font-size: 13px; margin-top: 6px; display: none; }
        .success-msg { background: #d4edda; color: #155724; padding: 12px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; display: none; }
        .password-toggle { position: relative; }
        .password-toggle input { padding-right: 45px; }
        .password-toggle .toggle-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #999; font-size: 16px; }
        @media (max-width: 768px) { .auth-container { flex-direction: column; width: 95vw; } .auth-left { width: 100%; padding: 30px; text-align: center; } .auth-right { padding: 30px; } }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-left">
            <div class="logo-big">🌍</div>
            <h1>ShopWorld</h1>
            <p>全球精选好物，让购物更简单<br>登录享受专属优惠和个性化推荐</p>
        </div>
        <div class="auth-right">
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="switchTab('login')">登录</div>
                <div class="auth-tab" onclick="switchTab('register')">注册</div>
            </div>
            <div class="success-msg" id="successMsg"></div>
            <!-- Login Form -->
            <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-field">
                    <label>用户名 / 邮箱</label>
                    <input type="text" id="loginUsername" placeholder="请输入用户名或邮箱" required>
                </div>
                <div class="form-field password-toggle">
                    <label>密码</label>
                    <input type="password" id="loginPassword" placeholder="请输入密码" required>
                    <button type="button" class="toggle-btn" onclick="togglePassword('loginPassword', this)"><i class="fas fa-eye"></i></button>
                </div>
                <div class="form-options">
                    <label><input type="checkbox" id="rememberMe"> 记住我</label>
                    <a href="#">忘记密码？</a>
                </div>
                <div class="error-msg" id="loginError"></div>
                <button type="submit" class="btn-auth" id="loginBtn"><i class="fas fa-sign-in-alt"></i> 登 录</button>
            </form>
            <!-- Register Form -->
            <form class="auth-form" id="registerForm" onsubmit="handleRegister(event)">
                <div class="form-field">
                    <label>用户名</label>
                    <input type="text" id="regUsername" placeholder="请输入用户名（4-20位）" required minlength="4" maxlength="20">
                </div>
                <div class="form-field">
                    <label>邮箱</label>
                    <input type="email" id="regEmail" placeholder="请输入邮箱地址" required>
                </div>
                <div class="form-field password-toggle">
                    <label>密码</label>
                    <input type="password" id="regPassword" placeholder="至少6位密码" required minlength="6">
                    <button type="button" class="toggle-btn" onclick="togglePassword('regPassword', this)"><i class="fas fa-eye"></i></button>
                </div>
                <div class="form-field password-toggle">
                    <label>确认密码</label>
                    <input type="password" id="regConfirm" placeholder="请再次输入密码" required>
                    <button type="button" class="toggle-btn" onclick="togglePassword('regConfirm', this)"><i class="fas fa-eye"></i></button>
                </div>
                <div class="form-field">
                    <label>手机号（选填）</label>
                    <input type="tel" id="regPhone" placeholder="请输入手机号码">
                </div>
                <div class="error-msg" id="regError"></div>
                <button type="submit" class="btn-auth" id="regBtn"><i class="fas fa-user-plus"></i> 注 册</button>
            </form>
            <div class="back-link"><a href="index.html"><i class="fas fa-arrow-left"></i> 返回首页</a></div>
        </div>
    </div>
    <script>
        const API = '/api';
        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='register'&&i===1)));
            document.getElementById('loginForm').classList.toggle('active', tab==='login');
            document.getElementById('registerForm').classList.toggle('active', tab==='register');
            hideMessages();
        }
        function hideMessages() { document.getElementById('loginError').style.display='none'; document.getElementById('regError').style.display='none'; document.getElementById('successMsg').style.display='none'; }
        function showError(id, msg) { const el=document.getElementById(id); el.textContent=msg; el.style.display='block'; }
        function showSuccess(msg) { const el=document.getElementById('successMsg'); el.textContent=msg; el.style.display='block'; }
        function togglePassword(inputId, btn) { const inp=document.getElementById(inputId); const isPass=inp.type==='password'; inp.type=isPass?'text':'password'; btn.innerHTML=isPass?'<i class="fas fa-eye-slash"></i>':'<i class="fas fa-eye"></i>'; }
        async function handleLogin(e) {
            e.preventDefault(); hideMessages();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 登录中...';
            try {
                const res = await fetch(API+'/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, password}) });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('shopworld_token', data.data.token);
                    localStorage.setItem('shopworld_user', JSON.stringify(data.data.user));
                    showSuccess('✓ 登录成功！正在跳转...');
                    setTimeout(() => window.location.href = 'index.html', 1000);
                } else { showError('loginError', data.message || '登录失败'); }
            } catch (err) { showError('loginError', '网络错误，请稍后重试'); }
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> 登 录';
        }
        async function handleRegister(e) {
            e.preventDefault(); hideMessages();
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const phone = document.getElementById('regPhone').value.trim();
            if (password !== confirm) { showError('regError', '两次输入的密码不一致'); return; }
            const btn = document.getElementById('regBtn');
            btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 注册中...';
            try {
                const res = await fetch(API+'/auth/register', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({username, email, password, phone}) });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('shopworld_token', data.data.token);
                    localStorage.setItem('shopworld_user', JSON.stringify(data.data.user));
                    showSuccess('✓ 注册成功！正在跳转...');
                    setTimeout(() => window.location.href = 'index.html', 1000);
                } else { showError('regError', data.message || '注册失败'); }
            } catch (err) { showError('regError', '网络错误，请稍后重试'); }
            btn.disabled = false; btn.innerHTML = '<i class="fas fa-user-plus"></i> 注 册';
        }
        // Check if already logged in
        (function() {
            const token = localStorage.getItem('shopworld_token');
            if (token) { window.location.href = 'index.html'; }
        })();
    </script>
</body>
</html>
